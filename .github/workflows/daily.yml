name: Daily paper trading update

on:
  schedule:
    # 22:00 UTC, Mon-Fri — after US market close (4pm ET) in both EST and EDT
    - cron: '0 22 * * 1-5'
  workflow_dispatch:   # allow manual runs too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        run: python daily_update.py

      - name: Commit updated logs/state
        run: |
          git config user.name "regime-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Daily paper trading update [skip ci]"
          git push
