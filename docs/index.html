<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Regime-Switching Paper Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0d10;
    --panel:#12161b;
    --line:#1f262d;
    --ink:#dfe6ea;
    --dim:#7a8791;
    --bull:#3ecf8e;
    --bear:#e2574c;
    --side:#d9a441;
    --accent:#5b8def;
    --mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    --sans: 'Inter', -apple-system, Segoe UI, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    margin:0; padding:32px 24px 80px; min-height:100vh;
  }
  .wrap{max-width:1080px; margin:0 auto;}
  header{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; flex-wrap:wrap; gap:12px;}
  h1{font-size:20px; font-weight:600; margin:0; letter-spacing:.2px;}
  .sub{color:var(--dim); font-size:12.5px; margin-top:4px; font-family:var(--mono);}
  #asof{font-family:var(--mono); font-size:12px; color:var(--dim); text-align:right;}
  #asof b{color:var(--ink); font-weight:600;}

  .stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:20px;}
  .stat{background:var(--panel); padding:14px 16px;}
  .stat .label{font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin-bottom:6px;}
  .stat .value{font-family:var(--mono); font-size:19px; font-weight:600;}
  .pos{color:var(--bull);} .neg{color:var(--bear);}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px 18px 8px; margin-bottom:20px;}
  .panel h2{font-size:12.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin:0 0 12px; font-weight:600;}
  .chart-box{position:relative; height:260px;}
  .chart-box.small{height:150px;}

  .grid-2{display:grid; grid-template-columns:1.4fr 1fr; gap:20px;}
  @media (max-width:760px){ .grid-2{grid-template-columns:1fr;} }

  .regime-strip{display:flex; height:22px; border-radius:5px; overflow:hidden; margin-bottom:10px;}
  .regime-legend{display:flex; gap:16px; font-size:11.5px; color:var(--dim); font-family:var(--mono);}
  .dot{display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:6px; vertical-align:middle;}

  table{width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12.5px;}
  th,td{text-align:left; padding:7px 6px; border-bottom:1px solid var(--line);}
  th{color:var(--dim); font-weight:500; text-transform:uppercase; font-size:10.5px; letter-spacing:.5px;}
  tr:last-child td{border-bottom:none;}

  .weight-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:9px; font-family:var(--mono); font-size:12px;}
  .weight-bar-row .name{width:48px; color:var(--dim);}
  .weight-bar-track{flex:1; background:#1a2027; border-radius:4px; height:14px; position:relative; overflow:hidden;}
  .weight-bar-fill{position:absolute; left:0; top:0; bottom:0; background:var(--accent); border-radius:4px;}
  .weight-bar-row .val{width:52px; text-align:right;}

  .empty{color:var(--dim); font-family:var(--mono); font-size:13px; padding:40px 0; text-align:center;}
  a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>Regime-Switching Paper Book</h1>
      <div class="sub">3-state HMM · vol-targeted · walk-forward, live since first decision</div>
    </div>
    <div id="asof">loading…</div>
  </header>

  <div id="content">
    <div class="empty">Loading logs…</div>
  </div>

</div>

<script>
const FMT_PCT = (x, d=2) => (x*100).toFixed(d) + '%';

async function loadCSV(path){
  const res = await fetch(path + '?_=' + Date.now());
  if(!res.ok) return [];
  const text = await res.text();
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const cells = line.split(',');
    const row = {};
    headers.forEach((h,i)=> row[h] = cells[i]);
    return row;
  });
}

function metrics(equityRows){
  const rets = equityRows.map(r => parseFloat(r.return));
  const n = rets.length;
  if(n === 0) return null;
  const mean = rets.reduce((a,b)=>a+b,0)/n;
  const variance = rets.reduce((a,b)=>a+(b-mean)**2,0)/Math.max(n-1,1);
  const vol = Math.sqrt(variance);
  const annRet = mean*252;
  const annVol = vol*Math.sqrt(252);
  const sharpe = annVol > 0 ? (annRet - 0.03)/annVol : 0;

  let peak = 1, mdd = 0;
  equityRows.forEach(r=>{
    const eq = parseFloat(r.equity);
    peak = Math.max(peak, eq);
    mdd = Math.min(mdd, eq/peak - 1);
  });

  const totalReturn = parseFloat(equityRows[n-1].equity) - 1;
  return {annRet, annVol, sharpe, mdd, totalReturn, n};
}

function render(equityRows, weightRows){
  const content = document.getElementById('content');

  if(equityRows.length === 0){
    content.innerHTML = `<div class="empty">No realized trading days logged yet — the book is in its bootstrap phase.<br>
      Weight decisions so far: ${weightRows.length}. Check back after the next scheduled run.</div>`;
    document.getElementById('asof').innerHTML = weightRows.length
      ? `first decision <b>${weightRows[0].date}</b>`
      : '';
    return;
  }

  const m = metrics(equityRows);
  const lastEq = equityRows[equityRows.length-1];
  const lastW = weightRows[weightRows.length-1];
  document.getElementById('asof').innerHTML = `updated through <b>${lastEq.date}</b> · ${m.n} trading days live`;

  const splitInfo = lastW.split_date
    ? `<div class="sub" style="text-align:right; margin-top:2px;">today's refit: HMM on ${lastW.n_train_days} days (through ${lastW.split_date}) · regimes/portfolios on ${lastW.n_test_days} out-of-sample days</div>`
    : '';
  document.getElementById('asof').innerHTML += splitInfo;

  const tickers = Object.keys(lastW).filter(k=>k.startsWith('w_')).map(k=>k.slice(2));

  content.innerHTML = `
    <div class="stat-row">
      <div class="stat"><div class="label">Equity</div><div class="value">${parseFloat(lastEq.equity).toFixed(4)}</div></div>
      <div class="stat"><div class="label">Total Return</div><div class="value ${m.totalReturn>=0?'pos':'neg'}">${FMT_PCT(m.totalReturn)}</div></div>
      <div class="stat"><div class="label">Ann. Return</div><div class="value ${m.annRet>=0?'pos':'neg'}">${FMT_PCT(m.annRet)}</div></div>
      <div class="stat"><div class="label">Ann. Vol</div><div class="value">${FMT_PCT(m.annVol)}</div></div>
      <div class="stat"><div class="label">Sharpe</div><div class="value">${m.sharpe.toFixed(2)}</div></div>
      <div class="stat"><div class="label">Max Drawdown</div><div class="value neg">${FMT_PCT(m.mdd)}</div></div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <h2>Equity Curve</h2>
        <div class="chart-box"><canvas id="equityChart"></canvas></div>
      </div>
      <div class="panel">
        <h2>Current Regime Probabilities</h2>
        <div class="chart-box small"><canvas id="regimeChart"></canvas></div>
        <h2 style="margin-top:16px;">Current Target Weights</h2>
        <div id="weightsBars"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Drawdown</h2>
      <div class="chart-box small"><canvas id="ddChart"></canvas></div>
    </div>

    <div class="panel">
      <h2>Recent Activity</h2>
      <table>
        <thead><tr><th>Date</th><th>Return</th><th>Equity</th><th>P(Bull)</th><th>P(Bear)</th><th>P(Side)</th></tr></thead>
        <tbody>
          ${equityRows.slice(-15).reverse().map(r=>{
            const wr = weightRows.find(w=>w.date===r.date);
            const ret = parseFloat(r.return);
            return `<tr>
              <td>${r.date}</td>
              <td class="${ret>=0?'pos':'neg'}">${FMT_PCT(ret)}</td>
              <td>${parseFloat(r.equity).toFixed(4)}</td>
              <td>${wr?FMT_PCT(parseFloat(wr.prob_bull),0):'—'}</td>
              <td>${wr?FMT_PCT(parseFloat(wr.prob_bear),0):'—'}</td>
              <td>${wr?FMT_PCT(parseFloat(wr.prob_sideways),0):'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Equity chart
  new Chart(document.getElementById('equityChart'), {
    type:'line',
    data:{ labels: equityRows.map(r=>r.date),
      datasets:[{ data: equityRows.map(r=>parseFloat(r.equity)), borderColor:'#5b8def', backgroundColor:'rgba(91,141,239,0.08)', fill:true, pointRadius:0, borderWidth:1.6, tension:0.15 }]},
    options:{ plugins:{legend:{display:false}}, scales:{
      x:{ticks:{color:'#7a8791', maxTicksLimit:8, font:{family:'monospace',size:10}}, grid:{color:'#1f262d'}},
      y:{ticks:{color:'#7a8791', font:{family:'monospace',size:10}}, grid:{color:'#1f262d'}}
    }}
  });

  // Drawdown chart
  let peak=1; const dd = equityRows.map(r=>{ const eq=parseFloat(r.equity); peak=Math.max(peak,eq); return (eq/peak-1); });
  new Chart(document.getElementById('ddChart'), {
    type:'line',
    data:{ labels: equityRows.map(r=>r.date),
      datasets:[{ data:dd, borderColor:'#e2574c', backgroundColor:'rgba(226,87,76,0.12)', fill:true, pointRadius:0, borderWidth:1.4 }]},
    options:{ plugins:{legend:{display:false}}, scales:{
      x:{ticks:{color:'#7a8791', maxTicksLimit:8, font:{family:'monospace',size:10}}, grid:{color:'#1f262d'}},
      y:{ticks:{color:'#7a8791', font:{family:'monospace',size:10}, callback:v=>(v*100).toFixed(0)+'%'}, grid:{color:'#1f262d'}}
    }}
  });

  // Regime probability doughnut
  new Chart(document.getElementById('regimeChart'), {
    type:'doughnut',
    data:{ labels:['Bull','Bear','Sideways'],
      datasets:[{ data:[parseFloat(lastW.prob_bull), parseFloat(lastW.prob_bear), parseFloat(lastW.prob_sideways)],
        backgroundColor:['#3ecf8e','#e2574c','#d9a441'], borderWidth:0 }]},
    options:{ plugins:{legend:{position:'bottom', labels:{color:'#dfe6ea', font:{size:11}}}} }
  });

  // Weight bars
  const maxAbs = Math.max(...tickers.map(t=>Math.abs(parseFloat(lastW['w_'+t]))), 0.01);
  document.getElementById('weightsBars').innerHTML = tickers.map(t=>{
    const w = parseFloat(lastW['w_'+t]);
    const pct = Math.abs(w)/maxAbs*100;
    return `<div class="weight-bar-row">
      <span class="name">${t}</span>
      <span class="weight-bar-track"><span class="weight-bar-fill" style="width:${pct}%; background:${w<0?'#e2574c':'#5b8def'}"></span></span>
      <span class="val">${FMT_PCT(w,1)}</span>
    </div>`;
  }).join('');
}

(async function(){
  const [equityRows, weightRows] = await Promise.all([
    loadCSV('./data/equity_log.csv'),
    loadCSV('./data/weights_log.csv'),
  ]);
  render(equityRows, weightRows);
})();
</script>
</body>
</html>
